name: Publish to GitHub Packages

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run build

      - run: bun test.js

      - name: Check size
        run: |
          size=$(wc -c < droplet.min.js)
          echo "droplet.min.js: ${size} bytes"
          if [ "$size" -gt 30000 ]; then
            echo "::error::droplet.min.js is ${size} bytes, exceeds 30KB"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
