name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run build

      - run: bun test.js

      - name: Check size
        run: |
          size=$(wc -c < droplet.min.js)
          echo "droplet.min.js: ${size} bytes"
          if [ "$size" -gt 30000 ]; then
            echo "::error::droplet.min.js is ${size} bytes, exceeds 30KB"
            exit 1
          fi

      - name: Create GitHub Release
        run: |
          size=$(wc -c < droplet.min.js | tr -d ' ')
          gzip=$(bun -e "const z=require('zlib'),f=require('fs');process.stdout.write(''+z.gzipSync(f.readFileSync('droplet.min.js')).length)")
          gh release create ${{ github.ref_name }} \
            droplet.js droplet.min.js \
            --title "${{ github.ref_name }}" \
            --notes "droplet.min.js: ${size} bytes (${gzip} gzip)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
